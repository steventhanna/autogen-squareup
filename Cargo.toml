[package]
name = "autogen-squareup"
version = "0.20251016.1"
edition = "2021"
license = "MIT"
description = "Auto-generated, strongly-typed Rust client for the Square API"
keywords = ["square", "payments", "api", "sdk"]
categories = ["api-bindings"]
repository = "https://github.com/steventhanna/autogen-squareup"

[dependencies]
reqwest = { version = "^0.12", default-features = false, features = ["json", "multipart"] }
serde = { version = "^1.0", features = ["derive"] }
serde_json = "^1.0"
serde_with = { version = "^3.8", default-features = false, features = ["base64", "std", "macros"] }
url = "^2.5"

[dev-dependencies]
tokio = { version = "^1", features = ["macros", "rt-multi-thread"] }
uuid = { version = "^1", features = ["v4"] }

[features]
default = ["all", "native-tls"]
native-tls = ["reqwest/native-tls"]
rustls = ["reqwest/rustls-tls"]
all = [
    "apple-pay",
    "bank-accounts",
    "booking-custom-attributes",
    "bookings",
    "cards",
    "cash-drawers",
    "catalog",
    "channels",
    "checkout",
    "customer-custom-attributes",
    "customer-groups",
    "customer-segments",
    "customers",
    "devices",
    "disputes",
    "employees",
    "events",
    "gift-card-activities",
    "gift-cards",
    "inventory",
    "invoices",
    "labor",
    "location-custom-attributes",
    "locations",
    "loyalty",
    "merchant-custom-attributes",
    "merchants",
    "mobile-authorization",
    "oauth",
    "order-custom-attributes",
    "orders",
    "payments",
    "payouts",
    "refunds",
    "sites",
    "snippets",
    "subscriptions",
    "team",
    "terminal",
    "transactions",
    "transfer-order",
    "v1-transactions",
    "vendors",
    "webhook-subscriptions",
]
apple-pay = []
bank-accounts = []
booking-custom-attributes = []
bookings = []
cards = []
